<style>

  button:hover { background: #f5f1ea; }

  .runner-list { display: grid; gap: 4px; }
  label.runner { display: grid; grid-template-columns: 20px 1fr; gap: 7px; align-items: start; padding: 6px 5px; border-radius: 6px; font-size: 13px; line-height: 1.25; }
  label.runner:hover { background: #f4efe7; }
  .meta { color: var(--muted); font-size: 12px; }
  .axis { stroke: #2f2a24; stroke-width: 1.5; }
  .grid { stroke: var(--grid); stroke-width: 1; }
  .cp-line { stroke: #cfc7bc; stroke-width: 1; stroke-dasharray: 5 6; }
  .cp-label-bg { fill: #fffdf8; opacity: .88; stroke: #e6ded3; stroke-width: 1; }
  .cp-label { fill: #5f584f; font-size: 12px; }
  .cut-line { stroke: var(--cut); stroke-width: 4; stroke-dasharray: 10 8; fill: none; }
  .cut-guide { stroke: var(--cut); stroke-width: 1; stroke-dasharray: 3 5; opacity: .55; }
  .cut-label { fill: #b42323; font-size: 13px; font-weight: 700; }
  .track.finish { stroke: var(--finish); stroke-width: 1.25; opacity: .42; }
  .track.dnf { stroke: var(--dnf); stroke-width: 1.25; opacity: .32; }
  .track { cursor: pointer; }
  .track.selected { opacity: .98; stroke-width: 5.2; }
  .dnf-dot { fill: #d77a18; opacity: .42; }
  .tick { fill: var(--muted); font-size: 12px; }
  .legend text { font-size: 13px; fill: var(--muted); }
  .tooltip {
    position: absolute;
    display: none;
    pointer-events: none;
    z-index: 5;
    max-width: 260px;
    padding: 8px 10px;
    border: 1px solid #cfc7bc;
    border-radius: 6px;
    background: rgba(255, 253, 248, .96);
    color: var(--ink);
    font-size: 13px;
    line-height: 1.35;
    box-shadow: 0 8px 24px rgba(46, 40, 32, .14);
  }
  .tooltip .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  @media (max-width: 980px) {

<script>
const data = JSON.parse(document.getElementById('race-data').textContent);
const svg = document.getElementById('chart');
const tooltip = document.getElementById('tooltip');
const NS = 'http://www.w3.org/2000/svg';
const W = 1700, H = 1080;
const ml = 110, mr = 265, mt = 70, mb = 95;
const xmax = 35.2, ymax = 162.8;
const palette = ['#e4572e','#2f80ed','#1a936f','#8e44ad','#d99000','#007f7f','#c0392b','#5c6bc0','#6d4c41','#2e7d32'];
let selected = new Set();
let viewBox = {x:0, y:0, w:W, h:H};
let activePointers = new Map();
let pinchStart = null;
let panStart = null;
let suppressNextClick = false;
const groupVisibility = {
  top20: false,
  women: false,
  bottomFinishers: false,
  finishers: true,
  dnf: true,
};

function el(name, attrs={}, text='') {
  const node = document.createElementNS(NS, name);
  for (const [k,v] of Object.entries(attrs)) node.setAttribute(k, v);
  if (text) node.textContent = text;
  return node;
}
function sx(t) { return ml + (t / xmax) * (W - ml - mr); }
function sy(d) { return H - mb - (d / ymax) * (H - mt - mb); }
function path(points) { return points.map((p,i) => `${i ? 'L' : 'M'}${sx(p[0]).toFixed(1)},${sy(p[1]).toFixed(1)}`).join(' '); }
function cutoffText(t) { const h=Math.floor(t); const m=Math.round((t-h)*60); return `${h}:${String(m).padStart(2,'0')}`; }
function colorFor(id) { return palette[[...selected].indexOf(id) % palette.length]; }
function normalizeText(value) {
  return String(value || '').toLowerCase().replace(/\s+/g, '');
}
function displayName(t) {
  if (t.status !== 'dnf') return t.name;
  return t.name.trim().split(/\s+/)[0] || t.name;
}
function selectRunner(t) {
  selected.add(t.id);
  draw();
  renderList();
}
function isBottomFinisher(t) {
  if (t.status !== 'finish') return false;
  return t.rank > Math.floor(finishers.length * 0.7);
}
function isTrackVisible(t) {
  return (
    (groupVisibility.finishers && t.status === 'finish') ||
    (groupVisibility.dnf && t.status === 'dnf') ||
    (groupVisibility.top20 && t.status === 'finish' && t.rank <= 20) ||
    (groupVisibility.women && t.gender === '女子') ||
    (groupVisibility.bottomFinishers && isBottomFinisher(t))
  );
}
function renderGroupButtons() {
  document.querySelectorAll('.group-toggle').forEach(button => {
    const group = button.dataset.group;
    button.classList.toggle('active', Boolean(groupVisibility[group]));
    button.setAttribute('aria-pressed', String(Boolean(groupVisibility[group])));
  });
}
function setViewBox(next) {
  const minW = W / 8;
  const minH = H / 8;
  const w = Math.min(W, Math.max(minW, next.w));
  const h = Math.min(H, Math.max(minH, next.h));
  const x = Math.min(W - w, Math.max(0, next.x));
  const y = Math.min(H - h, Math.max(0, next.y));
  viewBox = {x, y, w, h};
  svg.setAttribute('viewBox', `${x} ${y} ${w} ${h}`);
}
function clientToSvgPoint(clientX, clientY) {
  const box = svg.getBoundingClientRect();
  return {
    x: viewBox.x + ((clientX - box.left) / box.width) * viewBox.w,
    y: viewBox.y + ((clientY - box.top) / box.height) * viewBox.h,
  };
}
function zoomAt(clientX, clientY, factor) {
  const p = clientToSvgPoint(clientX, clientY);
  const nextW = viewBox.w * factor;
  const nextH = viewBox.h * factor;
  const box = svg.getBoundingClientRect();
  const rx = (clientX - box.left) / box.width;
  const ry = (clientY - box.top) / box.height;
  setViewBox({
    x: p.x - nextW * rx,
    y: p.y - nextH * ry,
    w: nextW,
    h: nextH,
  });
}
function runnerTip(t) {
  const status = t.status === 'finish' ? `${t.rank}位完走` : 'DNF';
  const goal = t.status === 'finish' ? `ゴール ${t.goal}` : `最終記録 ${t.goal || '-'}`;
  const imputed = t.imputedCount ? ` / 仮補間 ${t.imputedCount}点` : '';
  return `<strong>${displayName(t)}</strong><div class="sub">${t.id} / ${status} / ${goal}${imputed}</div>`;
}
function attachTooltip(node, t) {
  node.addEventListener('pointerenter', () => {
    tooltip.innerHTML = runnerTip(t);
    tooltip.style.display = 'block';
  });
  node.addEventListener('pointermove', event => {
    const stage = svg.parentElement.getBoundingClientRect();
    const x = Math.min(event.clientX - stage.left + 14, stage.width - 275);
    const y = Math.max(8, event.clientY - stage.top - 42);
    tooltip.style.left = `${x}px`;
    tooltip.style.top = `${y}px`;
  });
  node.addEventListener('pointerleave', () => {
    tooltip.style.display = 'none';
  });
  node.addEventListener('click', event => {
    event.stopPropagation();
    if (suppressNextClick) {
      suppressNextClick = false;
      return;
    }
    selectRunner(t);
  });
}
function sameDist(a, b) { return Math.abs(a - b) < 0.01; }
function imputePoints(points) {
  const sorted = points.slice().sort((a,b) => a[1] - b[1] || a[0] - b[0]);
  const cpDistances = [0, ...data.checkpoints.map(cp => cp.dist)];
  const out = [];
  for (let i = 0; i < sorted.length - 1; i++) {
    const a = sorted[i], b = sorted[i + 1];
    out.push([a[0], a[1], false]);
    if (b[1] <= a[1]) continue;
    cpDistances
      .filter(dist => dist > a[1] && dist < b[1] && !sorted.some(p => sameDist(p[1], dist)))
      .forEach(dist => {
        const ratio = (dist - a[1]) / (b[1] - a[1]);
        out.push([a[0] + (b[0] - a[0]) * ratio, dist, true]);
      });
  }
  if (sorted.length) {
    const last = sorted[sorted.length - 1];
    out.push([last[0], last[1], false]);
  }
  return out.sort((a,b) => a[1] - b[1] || a[0] - b[0]);
}
function visiblePoints(t) {
  if (t.id === 'M5122') return t.points.filter(p => p[1] <= 53.8);
  return t.points;
}

data.tracks.forEach(t => {
  t.visiblePoints = visiblePoints(t);
  t.plotPoints = imputePoints(t.visiblePoints);
  t.imputedCount = t.plotPoints.filter(p => p[2]).length;
  if (t.id === 'M5122') t.goal = '10:59:18.60';
});
const totalImputed = data.tracks.reduce((sum, t) => sum + t.imputedCount, 0);

function draw() {
  svg.replaceChildren();
  tooltip.style.display = 'none';
  svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
  svg.appendChild(el('rect', {x:0,y:0,width:W,height:H,fill:'#fffdf8'}));

  for (let h=0; h<=35; h+=5) {
    svg.appendChild(el('line', {class:'grid', x1:sx(h), y1:mt, x2:sx(h), y2:H-mb}));
    svg.appendChild(el('text', {class:'tick', x:sx(h), y:H-mb+28, 'text-anchor':'middle'}, `${h}h`));
  }
  for (let d=0; d<=160; d+=20) {
    svg.appendChild(el('line', {class:'grid', x1:ml, y1:sy(d), x2:W-mr, y2:sy(d)}));
    svg.appendChild(el('text', {class:'tick', x:ml-14, y:sy(d)+5, 'text-anchor':'end'}, `${d}km`));
  }

  drawCheckpoints();
  drawTracks('dnf');
  drawTracks('finish');
  drawCutoffs();
  drawSelected();
  drawAxes();
  drawLegend();
}

function drawCheckpoints() {
  const labelX = W - mr - 190;
  const placed = [];
  data.checkpoints.forEach((cp, i) => {
    const y = sy(cp.dist);
    svg.appendChild(el('line', {class:'cp-line', x1:ml, y1:y, x2:W-mr, y2:y}));
    let ly = y - 4;
    while (placed.some(v => Math.abs(v - ly) < 16)) ly += 16;
    placed.push(ly);
    const txt = `${cp.name} ${cp.dist.toFixed(1)}km`;
    const w = Math.min(188, 58 + txt.length * 7);
    svg.appendChild(el('rect', {class:'cp-label-bg', x:labelX-6, y:ly-13, width:w, height:18, rx:4}));
    svg.appendChild(el('text', {class:'cp-label', x:labelX, y:ly}, txt));
  });
}

function drawTracks(status) {
  data.tracks.filter(t => t.status === status && t.visiblePoints.length > 1 && isTrackVisible(t)).forEach(t => {
    const line = el('path', {class:`track ${status}`, d:path(t.plotPoints), fill:'none', 'stroke-linejoin':'round', 'stroke-linecap':'round'});
    attachTooltip(line, t);
    svg.appendChild(line);
    if (status === 'dnf') {
      const p = t.visiblePoints[t.visiblePoints.length - 1];
      svg.appendChild(el('circle', {class:'dnf-dot', cx:sx(p[0]), cy:sy(p[1]), r:2.1}));
    }
  });
}

function drawSelected() {
  data.tracks.filter(t => selected.has(t.id)).forEach(t => {
    const color = colorFor(t.id);
    const line = el('path', {class:'track selected', d:path(t.plotPoints), fill:'none', stroke:color, 'stroke-linejoin':'round', 'stroke-linecap':'round'});
    attachTooltip(line, t);
    svg.appendChild(line);
    t.visiblePoints.forEach(p => svg.appendChild(el('circle', {cx:sx(p[0]), cy:sy(p[1]), r:3.2, fill:color})));
    t.plotPoints.filter(p => p[2]).forEach(p => svg.appendChild(el('circle', {cx:sx(p[0]), cy:sy(p[1]), r:3.4, fill:'#fffdf8', stroke:color, 'stroke-width':1.8})));
  });
}

function drawCutoffs() {
  const d = data.cutoffs.map((c,i) => `${i ? 'L' : 'M'}${sx(c.time).toFixed(1)},${sy(c.dist).toFixed(1)}`).join(' ');
  svg.appendChild(el('path', {class:'cut-line', d}));
  data.cutoffs.forEach(c => {
    svg.appendChild(el('line', {class:'cut-guide', x1:sx(c.time), y1:sy(c.dist), x2:sx(c.time), y2:H-mb}));
    svg.appendChild(el('circle', {cx:sx(c.time), cy:sy(c.dist), r:5, fill:'#d32f2f'}));
    svg.appendChild(el('text', {class:'cut-label', x:sx(c.time)+8, y:sy(c.dist)-8}, cutoffText(c.time)));
  });
}

function drawAxes() {
  svg.appendChild(el('line', {class:'axis', x1:ml, y1:H-mb, x2:W-mr, y2:H-mb}));
  svg.appendChild(el('line', {class:'axis', x1:ml, y1:mt, x2:ml, y2:H-mb}));
  svg.appendChild(el('text', {x:(ml+W-mr)/2, y:H-30, 'text-anchor':'middle', 'font-size':18}, '経過時間'));
  svg.appendChild(el('text', {x:31, y:(mt+H-mb)/2, transform:`rotate(-90 31 ${(mt+H-mb)/2})`, 'text-anchor':'middle', 'font-size':18}, '距離'));
}

function drawLegend() {
  const g = el('g', {class:'legend'});
  const items = [['#1f4f8f','完走者 92人'], ['#f29e4c','DNF者 277人'], ['#d32f2f','100mileソロ関門'], ['#5f584f',`仮補間 ${totalImputed}点`]];
  items.forEach((it,i) => {
    const y = 95 + i*28;
    g.appendChild(el('line', {x1:W-mr+18, y1:y, x2:W-mr+54, y2:y, stroke:it[0], 'stroke-width':5, 'stroke-linecap':'round'}));
    g.appendChild(el('text', {x:W-mr+64, y:y+5}, it[1]));
  });
  [...selected].forEach((id,i) => {
    const t = data.tracks.find(r => r.id === id);
    if (!t) return;
    const y = 205 + i*28;
    const rankText = t.status === 'finish' ? `${t.rank}位` : 'DNF';
    g.appendChild(el('line', {x1:W-mr+18, y1:y, x2:W-mr+54, y2:y, stroke:colorFor(id), 'stroke-width':5, 'stroke-linecap':'round'}));
    g.appendChild(el('text', {x:W-mr+64, y:y+5}, `${displayName(t)} ${rankText}`));
  });
  svg.appendChild(g);
}

const runnerList = document.getElementById('runnerList');
const searchInput = document.getElementById('search');
const finishers = data.tracks.filter(t => t.status === 'finish').sort((a,b) => a.rank - b.rank);
function applySearchSelection() {
  const q = normalizeText(searchInput.value);
  if (!q) {
    selected.clear();
    draw();
    renderList();
    return;
  }
  const matches = data.tracks.filter(t => normalizeText(`${t.name}${t.id}${t.rank || ''}`).includes(q));
  selected = new Set(matches.map(t => t.id));
  draw();
  renderList();
}
function renderList() {
  const q = normalizeText(searchInput.value);
  runnerList.replaceChildren();
  finishers.filter(t => !q || normalizeText(`${t.name}${t.id}${t.rank}`).includes(q)).forEach(t => {
    const label = document.createElement('label');
    label.className = 'runner';
    const input = document.createElement('input');
    input.type = 'checkbox'; input.checked = selected.has(t.id);
    input.addEventListener('change', () => { input.checked ? selected.add(t.id) : selected.delete(t.id); draw(); });
    const body = document.createElement('div');
    body.innerHTML = `<div>${t.rank}位 ${t.name}</div><div class="meta">${t.id} / ${t.goal} / ${t.gender} ${t.age}</div>`;
    label.append(input, body);
    runnerList.appendChild(label);
  });
}

searchInput.addEventListener('input', applySearchSelection);
document.getElementById('clear').addEventListener('click', () => { searchInput.value = ''; selected.clear(); draw(); renderList(); });
document.querySelectorAll('.group-toggle').forEach(button => {
  button.addEventListener('click', () => {
    const group = button.dataset.group;
    groupVisibility[group] = !groupVisibility[group];
    renderGroupButtons();
    draw();
  });
});
svg.addEventListener('click', () => {
  if (suppressNextClick) {
    suppressNextClick = false;
    return;
  }
  tooltip.style.display = 'none';
});
svg.addEventListener('wheel', event => {
  event.preventDefault();
  const factor = Math.exp(event.deltaY * 0.0015);
  zoomAt(event.clientX, event.clientY, factor);
}, {passive:false});
svg.addEventListener('dblclick', () => {
  setViewBox({x:0, y:0, w:W, h:H});
});
svg.addEventListener('pointerdown', event => {
  if (event.button != null && event.button !== 0) return;
  if (svg.setPointerCapture) svg.setPointerCapture(event.pointerId);
  panStart = {
    id: event.pointerId,
    x: event.clientX,
    y: event.clientY,
    viewBox: {...viewBox},
    moved: false,
  };
  svg.classList.add('panning');
  if (event.pointerType === 'touch') {
    activePointers.set(event.pointerId, {x:event.clientX, y:event.clientY});
    if (activePointers.size === 2) {
      const points = [...activePointers.values()];
      panStart = null;
      pinchStart = {
        distance: Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y),
        viewBox: {...viewBox},
        center: {
          x: (points[0].x + points[1].x) / 2,
          y: (points[0].y + points[1].y) / 2,
        },
      };
    }
  }
});
svg.addEventListener('pointermove', event => {
  if (activePointers.has(event.pointerId)) {
    activePointers.set(event.pointerId, {x:event.clientX, y:event.clientY});
    if (pinchStart && activePointers.size === 2) {
      const points = [...activePointers.values()];
      const distance = Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
      if (!distance) return;
      viewBox = {...pinchStart.viewBox};
      zoomAt(pinchStart.center.x, pinchStart.center.y, pinchStart.distance / distance);
      return;
    }
  }
  if (!panStart || panStart.id !== event.pointerId) return;
  const box = svg.getBoundingClientRect();
  const dx = ((event.clientX - panStart.x) / box.width) * panStart.viewBox.w;
  const dy = ((event.clientY - panStart.y) / box.height) * panStart.viewBox.h;
  if (Math.hypot(event.clientX - panStart.x, event.clientY - panStart.y) > 3) panStart.moved = true;
  setViewBox({
    x: panStart.viewBox.x - dx,
    y: panStart.viewBox.y - dy,
    w: panStart.viewBox.w,
    h: panStart.viewBox.h,
  });
});
['pointerup','pointercancel','pointerleave'].forEach(type => {
  svg.addEventListener(type, event => {
    if (panStart && panStart.id === event.pointerId) {
      if (panStart.moved) {
        suppressNextClick = true;
        setTimeout(() => { suppressNextClick = false; }, 300);
      }
      panStart = null;
      svg.classList.remove('panning');
    }
    activePointers.delete(event.pointerId);
    if (activePointers.size < 2) pinchStart = null;
  });
});

draw();
renderList();
renderGroupButtons();
</script>
</body>
</html>
